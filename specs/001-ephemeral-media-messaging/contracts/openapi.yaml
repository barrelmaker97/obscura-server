openapi: 3.0.3
info:
  title: Obscura Ephemeral Media Messaging API
  description: |
    Backend service for the Obscura messaging system. 
    This API acts as a "blind courier" for end-to-end encrypted media.
    
    ### Key Concepts:
    * **Zero-Knowledge**: The server never sees plaintext or decryption keys.
    * **Signal Protocol**: Uses X3DH for key agreement. Client must fetch a 'bundle' to start a session.
    * **Burn-on-View**: Messages are deleted from the server immediately after the `/read` endpoint is called.
    * **WebSockets**: Used exclusively for the server to push new messages and receipts to the client.
  version: 0.1.0

servers:
  - url: /v1
    description: Production API v1

paths:
  # --- IDENTITY & REGISTRATION ---
  /devices/register:
    post:
      tags:
        - Identity
      summary: Register account and initial device
      description: Registers a unique username and the initial Signal key material for the user's single device.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - registration_id
                - identity_key
                - signed_pre_key
                - one_time_pre_keys
              properties:
                username:
                  type: string
                password:
                  type: string
                registration_id:
                  type: integer
                identity_key:
                  type: string
                  description: Base64 identity public key
                signed_pre_key:
                  type: object
                  properties:
                    key_id:
                      type: integer
                    public_key:
                      type: string
                    signature:
                      type: string
                one_time_pre_keys:
                  type: array
                  items:
                    type: object
                    properties:
                      key_id:
                        type: integer
                      public_key:
                        type: string
      responses:
        '201':
          description: Registered successfully. Returns initial session token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Username or keys already in use.

  # --- AUTHENTICATION ---
  /auth/token:
    post:
      tags:
        - Auth
      summary: Refresh session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  # --- KEY EXCHANGE (X3DH) ---
  /users/{username}/bundle:
    get:
      tags:
        - Handshake
      summary: Fetch PreKey bundle for a recipient
      description: Used by a sender to establish an E2EE session. The server atomically "pops" one One-Time PreKey.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bundle retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  identity_key:
                    type: string
                  registration_id:
                    type: integer
                  signed_pre_key:
                    type: object
                    properties:
                      key_id:
                        type: integer
                      public_key:
                        type: string
                      signature:
                        type: string
                  one_time_pre_key:
                    type: object
                    nullable: true
                    properties:
                      key_id:
                        type: integer
                      public_key:
                        type: string

  # --- MESSAGING PIPELINE ---
  /messages:
    post:
      tags:
        - Messaging
      summary: Initialize a message intent
      security:
        - bearerAuth: []
        - deviceSig: []
      description: The first step in sending. Reserves IDs for the message and the blob.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - recipient_username
              properties:
                recipient_username:
                  type: string
      responses:
        '201':
          description: Intent created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_id:
                    type: string
                    format: uuid
                  ciphertext_blob_id:
                    type: string
                    format: uuid

  /messages/{id}/ready:
    post:
      tags:
        - Messaging
      summary: Finalize and release message
      security:
        - bearerAuth: []
        - deviceSig: []
      description: Called after the S3 upload is successful to trigger delivery to the recipient.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - storage_pointer
                - size_bytes
              properties:
                storage_pointer:
                  type: string
                size_bytes:
                  type: integer
                checksum:
                  type: string
      responses:
        '200':
          description: Message released.

  /messages/{id}/delivered:
    post:
      tags:
        - Messaging
      summary: Confirm delivery
      security:
        - bearerAuth: []
        - deviceSig: []
      description: Recipient device calls this when it receives the push via WebSocket.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Status updated.

  /messages/{id}/read:
    post:
      tags:
        - Messaging
      summary: Mark as read and trigger burn
      security:
        - bearerAuth: []
        - deviceSig: []
      description: Triggers the immediate deletion of the S3 blob and DB record.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Burn initiated.

  # --- STORAGE ---
  /attachments/presign:
    post:
      tags:
        - Storage
      summary: Get S3 upload URL
      security:
        - bearerAuth: []
        - deviceSig: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message_id
                - content_length
              properties:
                message_id:
                  type: string
                  format: uuid
                content_length:
                  type: integer
      responses:
        '200':
          description: URL issued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_url:
                    type: string
                  storage_pointer:
                    type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    deviceSig:
      type: apiKey
      in: header
      name: X-Obscura-Signature
  
  schemas:
    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 3600