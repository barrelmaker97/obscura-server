openapi: 3.0.3
info:
  title: Obscura Ephemeral Media Messaging API (MVP)
  version: 0.1.0
servers:
  - url: /
paths:
  /v1/devices/register:
    post:
      summary: Register user + device and upload Signal key material
      description: Client registers account and device key material (registration_id, identity_key, signed_pre_key, and one-time pre-keys). Server returns an initial access token for the device to use.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - registration_id
                - identity_key
                - signed_pre_key
                - one_time_pre_keys
              properties:
                username:
                  type: string
                password:
                  type: string
                registration_id:
                  type: integer
                identity_key:
                  type: string
                  description: Base64-encoded identity public key
                signed_pre_key:
                  type: object
                  properties:
                    key_id:
                      type: integer
                    public_key:
                      type: string
                    signature:
                      type: string
                one_time_pre_keys:
                  type: array
                  items:
                    type: object
                    properties:
                      key_id:
                        type: integer
                      public_key:
                        type: string
      responses:
        '201':
          description: Device and key material registered; initial session token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    format: uuid
                  device_id:
                    type: string
                    format: uuid
                  access_token:
                    type: string
                  expires_in:
                    type: integer
        '400':
          description: Invalid request
        '409':
          description: Username already exists or duplicate keys

  /auth/token:
    post:
      summary: Exchange username/password for short-lived access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Access token issued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: JWT or opaque bearer token (expires in 1 hour)
                  token_type:
                    type: string
                    default: Bearer
                  expires_in:
                    type: integer
        '401':
          description: Invalid username or password
        '400':
          description: Missing required fields

  /presign-upload:
    post:
      summary: Request presigned S3 upload URL for an encrypted blob
      security:
        - bearerAuth: []
        - deviceSig: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - filename
                - content_length
                - message_id
              properties:
                filename:
                  type: string
                content_length:
                  type: integer
                message_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Presigned upload URL issued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_url:
                    type: string
                    format: uri
                  storage_pointer:
                    type: string
                  fields:
                    type: object
        '400':
          description: Invalid request
        '401':
          description: Missing or invalid auth/signature

  /v1/messages:
    post:
      summary: Create a message intent and associated ciphertext blob placeholder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - recipient_username
              properties:
                recipient_username:
                  type: string
                metadata:
                  type: object
      responses:
        '201':
          description: Message intent created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_id:
                    type: string
                    format: uuid
                  ciphertext_blob_id:
                    type: string
                    format: uuid
        '400':
          description: Invalid request
        '404':
          description: Recipient not found

  /v1/messages/{id}/ready:
    post:
      summary: Notify server that S3 upload completed and release message for delivery
      security:
        - bearerAuth: []
        - deviceSig: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                storage_pointer:
                  type: string
                size_bytes:
                  type: integer
                checksum:
                  type: string
      responses:
        '200':
          description: Message released and queued for delivery; NEW_MESSAGE event will be emitted to recipient
        '400':
          description: Invalid request or missing upload
        '401':
          description: Missing or invalid auth/signature

  /v1/messages/{id}/delivered:
    post:
      summary: Recipient notifies server that a message was delivered to device (update status to delivered)
      security:
        - bearerAuth: []
        - deviceSig: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                timestamp:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Message marked as delivered and sender will receive a delivered receipt
        '400':
          description: Invalid request
        '401':
          description: Missing or invalid auth/signature

  /v1/messages/{id}/read:
    post:
      summary: Mark message as read and trigger burn (device-signed by recipient)
      security:
        - bearerAuth: []
        - deviceSig: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                timestamp:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Message marked read; server initiated S3 deletion and will emit read receipt
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - read
                  message_id:
                    type: string
                    format: uuid
        '400':
          description: Invalid message ID format
        '401':
          description: Missing or invalid auth/signature
        '403':
          description: Not authorized to read this message (not recipient)
        '404':
          description: Message not found or already deleted

  /v1/users/{username}/bundle:
    get:
      summary: Retrieve PreKey bundle for a user (atomic pop of one-time pre-key)
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PreKey bundle returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  identity_key:
                    type: string
                    description: Base64-encoded identity public key
                  registration_id:
                    type: integer
                  signed_pre_key:
                    type: object
                    properties:
                      key_id:
                        type: integer
                      public_key:
                        type: string
                      signature:
                        type: string
                  one_time_pre_key:
                    type: object
                    nullable: true
                    properties:
                      key_id:
                        type: integer
                      public_key:
                        type: string
        '404':
          description: User not found or no available pre-keys

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    deviceSig:
      type: apiKey
      in: header
      name: X-SecureSnap-Signature
