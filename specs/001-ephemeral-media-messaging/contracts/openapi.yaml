openapi: 3.0.3
info:
  title: Obscura Ephemeral Media Messaging API
  description: |
    Backend service for the Obscura messaging system. 
    This API acts as a "blind courier" for end-to-end encrypted media.
    
    ### Key Concepts:
    * **Zero-Knowledge**: The server never sees plaintext or decryption keys.
    * **Signal Protocol**: Uses X3DH for key agreement. Client must fetch a 'bundle' to start a session.
    * **Burn-on-View**: Messages are deleted from the server immediately after the `/read` endpoint is called.
    * **WebSockets**: Used exclusively for the server to push new messages and receipts to the client. See `websockets.md`.
  version: 0.1.0

servers:
  - url: /v1
    description: Production API v1

paths:
  # --- IDENTITY & REGISTRATION ---
  /devices/register:
    post:
      tags:
        - Identity
      summary: Register account and initial device
      description: Registers a unique username and the initial Signal key material for the user's single device.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - registration_id
                - identity_key
                - signed_pre_key
                - one_time_pre_keys
              properties:
                username:
                  type: string
                password:
                  type: string
                registration_id:
                  type: integer
                identity_key:
                  type: string
                  description: Base64 identity public key
                signed_pre_key:
                  type: object
                  properties:
                    key_id:
                      type: integer
                    public_key:
                      type: string
                    signature:
                      type: string
                one_time_pre_keys:
                  type: array
                  items:
                    type: object
                    properties:
                      key_id:
                        type: integer
                      public_key:
                        type: string
      responses:
        '201':
          description: Registered successfully. Returns initial session token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Username or keys already in use.

  /auth/token:
    post:
      tags:
        - Identity
      summary: Refresh session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  # --- KEY EXCHANGE & MANAGEMENT (X3DH) ---
  /users/{username}/bundle:
    get:
      tags:
        - Handshake
      summary: Fetch PreKey bundle for a recipient
      description: Used by a sender to establish an E2EE session. The server atomically "pops" one One-Time PreKey.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bundle retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreKeyBundle'
        '404':
          description: User not found.

  /devices/me/one-time-pre-keys/count:
    get:
      tags:
        - Handshake
      summary: Get the count of remaining OTPKs for the authenticated device
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The remaining key count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /devices/me/one-time-pre-keys:
    post:
      tags:
        - Handshake
      summary: Upload new One-Time Pre-Keys for the authenticated device
      security:
        - bearerAuth: []
        - deviceSig: []
      parameters:
        - $ref: '#/components/parameters/DeviceTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - one_time_pre_keys
              properties:
                one_time_pre_keys:
                  type: array
                  items:
                    $ref: '#/components/schemas/OneTimePreKey'
      responses:
        '204':
          description: One-Time Pre-Keys uploaded successfully.

  # --- MESSAGING PIPELINE ---
  /attachments/presign:
    post:
      tags:
        - Messaging
      summary: Get a presigned URL for a new attachment
      description: Step 1 of sending. Get a temporary, one-time URL to upload an encrypted blob to S3.
      security:
        - bearerAuth: []
        - deviceSig: []
      parameters:
        - $ref: '#/components/parameters/DeviceTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content_length
              properties:
                content_length:
                  type: integer
                  description: The exact size of the file to be uploaded, in bytes.
      responses:
        '200':
          description: URL issued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_url:
                    type: string
                  storage_pointer:
                    type: string

  /messages:
    post:
      tags:
        - Messaging
      summary: Send a message
      description: Step 2 of sending. Called after the client has successfully uploaded the encrypted blob to S3 using the presigned URL. This action creates the message record and triggers delivery.
      security:
        - bearerAuth: []
        - deviceSig: []
      parameters:
        - $ref: '#/components/parameters/DeviceTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - recipient_username
                - storage_pointer
                - size_bytes
              properties:
                recipient_username:
                  type: string
                storage_pointer:
                  type: string
                size_bytes:
                  type: integer
                checksum:
                  type: string
      responses:
        '202':
          description: Message accepted for delivery. Returns the new message ID.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_id:
                    type: string
                    format: uuid
  
  /messages/{id}/delivered:
    post:
      tags:
        - Messaging
      summary: Confirm message delivery (recipient)
      description: Recipient's device calls this after receiving the message via WebSocket to confirm receipt.
      security:
        - bearerAuth: []
        - deviceSig: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/DeviceTimestamp'
      responses:
        '204':
          description: Status updated.

  /messages/{id}/read:
    post:
      tags:
        - Messaging
      summary: Mark message as read and trigger burn (recipient)
      description: Recipient's device calls this after the user views the message. Triggers the immediate and irreversible deletion of the S3 blob and all server-side message records.
      security:
        - bearerAuth: []
        - deviceSig: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/DeviceTimestamp'
      responses:
        '204':
          description: Burn initiated.

components:
  parameters:
    DeviceTimestamp:
      name: X-Obscura-Timestamp
      in: header
      required: true
      schema:
        type: string
        format: date-time
      description: ISO 8601 UTC timestamp for the device signature.

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    deviceSig:
      type: apiKey
      in: header
      name: X-Obscura-Signature
      description: A signature of the request body and timestamp, proving device key ownership. The server expects an `X-Obscura-Timestamp` header to be sent alongside this signature. The signature is calculated as `HMAC-SHA256(device_private_key, SHA256(request_body) + "|" + timestamp_string)`.
  
  schemas:
    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 3600
    
    SignedPreKey:
      type: object
      properties:
        key_id:
          type: integer
        public_key:
          type: string
        signature:
          type: string

    OneTimePreKey:
      type: object
      properties:
        key_id:
          type: integer
        public_key:
          type: string

    PreKeyBundle:
      type: object
      properties:
        identity_key:
          type: string
        registration_id:
          type: integer
        signed_pre_key:
          $ref: '#/components/schemas/SignedPreKey'
        one_time_pre_key:
          nullable: true
          $ref: '#/components/schemas/OneTimePreKey'