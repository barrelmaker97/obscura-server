openapi: 3.0.3
info:
  title: Obscura Server API
  description: |
    A Blind Broker API for Ephemeral Media Messaging.
    Implements the Signal-like "Queue" model where delivery = deletion.
  version: 0.1.0
paths:
  # --- Account & Identity ---
  /v1/accounts/register:
    post:
      summary: Register a new user and primary device.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
      responses:
        '201':
          description: Account created.

  # --- Keys (X3DH) ---
  /v1/keys:
    put:
      summary: Upload PreKeys (Signed and One-Time) for the current device.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreKeyUpload'
      responses:
        '200':
          description: Keys updated.

  /v1/keys/{userId}/devices/{deviceId}:
    get:
      summary: Fetch a PreKey Bundle to establish a session with a target device.
      description: Returns Identity Key, Signed PreKey, and one One-Time PreKey (which is then deleted from server).
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: PreKey Bundle retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreKeyBundle'

  # --- Media (Blind Storage) ---
  /v1/media:
    post:
      summary: Upload an encrypted media blob.
      description: Server stores blob and returns ID. Server does not know who it is for.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Media stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mediaId:
                    type: string
                    format: uuid
                  expiresAt:
                    type: integer

  /v1/media/{mediaId}:
    get:
      summary: Download an encrypted media blob.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Binary stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # --- Messaging (The Queue) ---
  /v1/messages/{destinationDeviceId}:
    post:
      summary: Send an encrypted message to a specific device.
      security:
        - bearerAuth: []
      parameters:
        - name: destinationDeviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: Protocol Buffer Envelope (Encrypted)
      responses:
        '201':
          description: Message queued.

  /v1/messages:
    get:
      summary: List pending messages for the authenticated device.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of message envelopes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IncomingMessageEnvelope'

  /v1/messages/{messageId}:
    delete:
      summary: Acknowledge receipt. Deletes message from queue.
      security:
        - bearerAuth: []
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Message deleted.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegistrationRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        identityKey:
          type: string
          format: byte
          description: Base64 encoded public identity key.
        registrationId:
          type: integer

    PreKeyUpload:
      type: object
      properties:
        signedPreKey:
          $ref: '#/components/schemas/SignedPreKey'
        oneTimePreKeys:
          type: array
          items:
            $ref: '#/components/schemas/OneTimePreKey'

    PreKeyBundle:
      type: object
      properties:
        identityKey:
          type: string
          format: byte
        signedPreKey:
          $ref: '#/components/schemas/SignedPreKey'
        oneTimePreKey:
          $ref: '#/components/schemas/OneTimePreKey'

    SignedPreKey:
      type: object
      properties:
        keyId:
          type: integer
        publicKey:
          type: string
          format: byte
        signature:
          type: string
          format: byte

    OneTimePreKey:
      type: object
      properties:
        keyId:
          type: integer
        publicKey:
          type: string
          format: byte

    IncomingMessageEnvelope:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: integer
          description: 1=Ciphertext, 2=KeyBundle, etc.
        sourceUserId:
          type: string
          format: uuid
        timestamp:
          type: integer
        content:
          type: string
          format: byte
          description: Encrypted body (Base64).
